[platformio]
default_envs = twatch-s3
boards_dir = boards

[env:twatch-s3]
platform = espressif32 @ ^6.9.0
board = lilygo_twatch_s3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
board_build.partitions = default_16MB.csv
upload_speed = 115200
upload_flags = --no-stub
build_flags =
    -DESP32
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=2
    -DRADIOLIB_STATIC_ONLY=1
    -DRADIOLIB_GODMODE=1
    -DESP32_CPU_FREQ=80
    -DRADIO_CLASS=CustomSX1262
    -DWRAPPER_CLASS=CustomSX1262Wrapper
    -DUSE_SX1262
    -DSX126X_DIO2_AS_RF_SWITCH=true
    -DSX126X_DIO3_TCXO_VOLTAGE=1.8
    -DSX126X_CURRENT_LIMIT=140
    -DSX126X_RX_BOOSTED_GAIN=1
    -DLORA_FREQ=910.525
    -DLORA_BW=62.5
    -DLORA_SF=7
    -DLORA_CR=5
    -DLORA_TX_POWER=22
    -DP_LORA_NSS=5
    -DP_LORA_DIO_1=9
    -DP_LORA_RESET=8
    -DP_LORA_BUSY=7
    -DP_LORA_SCLK=3
    -DP_LORA_MISO=4
    -DP_LORA_MOSI=1
    -DPIN_BOARD_SDA=10
    -DPIN_BOARD_SCL=11
    -DMAX_CONTACTS=32
    -DMAX_GROUP_CHANNELS=4
lib_deps =
    https://github.com/meshcore-dev/MeshCore.git
    lewisxhe/XPowersLib @ ^0.2.7
    densaugeo/base64 @ ^1.4.0
    lovyan03/LovyanGFX @ ^1.2.0
    adafruit/Adafruit DRV2605 Library @ ^1.2.4
